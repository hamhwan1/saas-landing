kind = "web"
previewPath = "/"
title = "Yettey Landing Page"
version = "1.0.0"
id = "artifacts/yettey-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25866

[services.development]
run = "pnpm --filter @workspace/yettey-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yettey-landing", "run", "build" ]
publicDir = "artifacts/yettey-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25866"
BASE_PATH = "/"
